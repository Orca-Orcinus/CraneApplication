name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify no credentials in code
        run: |
          # Scan for common credential patterns
          if grep -r "AKIA" . --include="*.dart" --include="*.json" --include="*.yaml" 2>/dev/null; then
            echo "❌ AWS credentials detected in code"
            exit 1
          fi
          if grep -r "ya29\." . --include="*.dart" --include="*.json" --include="*.yaml" 2>/dev/null; then
            echo "❌ Google OAuth tokens detected in code"
            exit 1
          fi
          echo "✅ No hardcoded credentials detected"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build web
        run: flutter build web --release --dart-define=ENVIRONMENT=production
      
      - name: Setup Node.js for Firebase
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy \
            --token=${{ secrets.FIREBASE_TOKEN }} \
            --project=craneapplication-a4a13 \
            --only hosting
