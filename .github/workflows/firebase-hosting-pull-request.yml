name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build web
        run: flutter build web --release
      
      - name: Setup Node.js for Firebase
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy preview to Firebase Hosting
        run: |
          firebase hosting:channel:deploy preview-${{ github.event.pull_request.number }} \
            --token=${{ secrets.FIREBASE_TOKEN }} \
            --project=craneapplication-a4a13
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 Firebase Hosting URL: https://craneapplication-a4a13.web.app/preview-${{ github.event.pull_request.number }}'
            })
